services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'",
        ]
      interval: 20s
      timeout: 10s
      retries: 10

  tor:
    image: dperson/torproxy
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      TOR_PROXY: ${TOR_PROXY}
      TOR_CONTROL_PORT: ${TOR_CONTROL_PORT}
      TOR_CONTROL_PASSWORD: ${TOR_CONTROL_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
      CRAWL_TIMEOUT: ${CRAWL_TIMEOUT}
      CIRCUIT_ROTATE_EVERY: ${CIRCUIT_ROTATE_EVERY}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      tor:
        condition: service_started
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.crawler.scheduler worker --loglevel=info --concurrency=5
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      TOR_PROXY: ${TOR_PROXY}
      TOR_CONTROL_PORT: ${TOR_CONTROL_PORT}
      TOR_CONTROL_PASSWORD: ${TOR_CONTROL_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
      CRAWL_TIMEOUT: ${CRAWL_TIMEOUT}
      CIRCUIT_ROTATE_EVERY: ${CIRCUIT_ROTATE_EVERY}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  beat:
    build: ./backend
    command: celery -A app.crawler.scheduler beat --loglevel=info
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: /api
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  elasticsearch-data:
